<div class="container mt-5" style="max-width:400px">

  <h3 class="mb-3">Login</h3>

  <form (ngSubmit)="login()">

    <div class="mb-3">
      <input
        type="email"
        class="form-control"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
      >
    </div>

    <div class="mb-3">
      <input
        type="password"
        class="form-control"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
      >
    </div>

    <button class="btn btn-primary w-100">
      Login
    </button>

    <p class="mt-3">
    Don't have an account?
    <a routerLink="/register">Register here</a>
    </p>

  </form>

</div>
