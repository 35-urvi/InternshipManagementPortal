<div class="container mt-5">

<h2>Student Registration</h2>

<form (ngSubmit)="register()" class="card p-4 shadow">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" [(ngModel)]="student.name" name="name" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" [(ngModel)]="student.email" name="email" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" [(ngModel)]="student.password" name="password" required>
</div>

<div class="mb-3">
<label>Department</label>
<input type="text" class="form-control" [(ngModel)]="student.department" name="department">
</div>

<div class="mb-3">
<label>CGPA</label>
<input type="number" class="form-control" [(ngModel)]="student.cgpa" name="cgpa">
</div>

<button class="btn btn-primary">Register</button>

</form>

</div>
