<div class="container mt-5">

<h2>Create Internship</h2>

<form (ngSubmit)="createInternship()" class="card p-4 shadow">

<div class="mb-3">
<label>Title</label>
<input type="text" class="form-control" [(ngModel)]="internship.title" name="title">
</div>

<div class="mb-3">
<label>Description</label>
<textarea class="form-control" [(ngModel)]="internship.description" name="description"></textarea>
</div>

<div class="mb-3">
<label>Required Skills</label>
<input type="text" class="form-control" [(ngModel)]="internship.requiredSkills" name="requiredSkills">
</div>

<div class="mb-3">
<label>Stipend</label>
<input type="number" class="form-control" [(ngModel)]="internship.stipend" name="stipend">
</div>

<button class="btn btn-primary">Create Internship</button>

</form>

</div>
