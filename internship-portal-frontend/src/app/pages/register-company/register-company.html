<div class="container mt-5">

<h2>Company Registration</h2>

<form (ngSubmit)="register()" class="card p-4 shadow">

<div class="mb-3">
<label>Company Name</label>
<input type="text" class="form-control" [(ngModel)]="company.companyName" name="companyName" required>
</div>

<div class="mb-3">
<label>Industry</label>
<input type="text" class="form-control" [(ngModel)]="company.industry" name="industry">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" [(ngModel)]="company.email" name="email" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" [(ngModel)]="company.password" name="password" required>
</div>

<button class="btn btn-success">Register</button>

</form>

</div>
